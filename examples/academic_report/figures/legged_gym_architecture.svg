<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">legged_gym and Unitree RL Gym actor-critic architecture</title>
  <desc id="desc">A paper-style architecture diagram of the legged_gym / Unitree RL Gym control stack, showing Isaac Gym environment observations, actor-critic policy, recurrent Unitree G1 variant, PD control and privileged critic observations.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202124"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#202124;stroke-width:1.8}
      .blue{fill:#e8f0fe;stroke:#174ea6;stroke-width:1.6}
      .green{fill:#e6f4ea;stroke:#137333;stroke-width:1.6}
      .yellow{fill:#fef7e0;stroke:#b06000;stroke-width:1.6}
      .gray{fill:#f7f8fa;stroke:#3c4043;stroke-width:1.5}
      .line{stroke:#202124;stroke-width:1.9;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#5f6368;stroke-width:1.4;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      text{font-family:Arial,Helvetica,sans-serif;fill:#202124}
      .title{font-size:28px;font-weight:700}
      .label{font-size:18px;font-weight:700}
      .body{font-size:15px}
      .small{font-size:13px;fill:#3c4043}
      .mono{font-family:Menlo,Consolas,monospace;font-size:13px}
    </style>
  </defs>

  <text x="58" y="56" class="title">legged_gym / Unitree RL Gym: Asymmetric PPO Locomotion Controller</text>
  <text x="58" y="84" class="small">Baseline architecture for transparent low-level control: parallel simulation, actor-critic policy, and PD joint targets.</text>

  <rect x="58" y="178" width="272" height="220" rx="8" class="blue"/>
  <text x="88" y="213" class="label">Isaac Gym environment</text>
  <text x="88" y="246" class="body">base velocity and gravity</text>
  <text x="88" y="272" class="body">command velocity</text>
  <text x="88" y="298" class="body">joint position / velocity</text>
  <text x="88" y="324" class="body">previous action</text>
  <text x="88" y="350" class="small">optional height measurements</text>
  <text x="88" y="376" class="mono">G1 obs=47, actions=12</text>

  <rect x="416" y="152" width="284" height="166" rx="8" class="green"/>
  <text x="446" y="187" class="label">Actor policy</text>
  <text x="446" y="220" class="body">standard legged_gym MLP</text>
  <text x="446" y="246" class="mono">[512, 256, 128], ELU</text>
  <text x="446" y="282" class="body">Unitree G1 recurrent variant</text>
  <text x="446" y="306" class="mono">LSTM 64, [32], ELU</text>

  <rect x="416" y="430" width="284" height="166" rx="8" class="yellow"/>
  <text x="446" y="465" class="label">Critic value function</text>
  <text x="446" y="498" class="body">asymmetric observations</text>
  <text x="446" y="524" class="body">privileged state during training</text>
  <text x="446" y="550" class="mono">critic hidden dims mirror actor</text>

  <rect x="786" y="190" width="250" height="166" rx="8" class="box"/>
  <text x="816" y="225" class="label">Action transform</text>
  <text x="816" y="258" class="mono">scaled action + default pose</text>
  <text x="816" y="286" class="body">joint target generation</text>
  <text x="816" y="316" class="mono">action_scale = 0.25 (G1)</text>

  <rect x="1110" y="190" width="230" height="166" rx="8" class="green"/>
  <text x="1140" y="225" class="label">Low-level control</text>
  <text x="1140" y="258" class="body">P control / PD targets</text>
  <text x="1140" y="286" class="body">simulated robot state</text>
  <text x="1140" y="316" class="mono">decimation = 4</text>

  <rect x="786" y="474" width="554" height="96" rx="8" class="gray"/>
  <text x="816" y="510" class="label">Reward and termination interface</text>
  <text x="816" y="543" class="body">tracking velocity, orientation, base height, action rate, joint limits, contact, alive terms</text>

  <path d="M 330 258 L 416 235" class="line"/>
  <path d="M 700 235 L 786 273" class="line"/>
  <path d="M 1036 273 L 1110 273" class="line"/>
  <path d="M 1225 356 C 1225 676 194 686 194 398" class="dash"/>
  <path d="M 330 332 C 366 421 384 490 416 513" class="dash"/>
  <path d="M 700 513 L 786 522" class="dash"/>

  <text x="58" y="742" class="small">Figure. legged_gym is intentionally simple: a compact actor produces joint targets, a critic can consume privileged state, and PPO updates both through parallel simulation.</text>
</svg>
