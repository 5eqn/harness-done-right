<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">SONIC universal-token architecture</title>
  <desc id="desc">A paper-style architecture diagram for SONIC / GR00T-WBC, showing multimodal motion encoders, FSQ tokenization, a universal latent token space, decoder, planner and Unitree G1 control.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#202124"/>
    </marker>
    <style>
      .box{fill:#ffffff;stroke:#202124;stroke-width:1.8}
      .blue{fill:#e8f0fe;stroke:#174ea6;stroke-width:1.6}
      .green{fill:#e6f4ea;stroke:#137333;stroke-width:1.6}
      .yellow{fill:#fef7e0;stroke:#b06000;stroke-width:1.6}
      .gray{fill:#f7f8fa;stroke:#3c4043;stroke-width:1.5}
      .line{stroke:#202124;stroke-width:1.8;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#5f6368;stroke-width:1.4;fill:none;stroke-dasharray:7 6;marker-end:url(#arrow)}
      text{font-family:Arial,Helvetica,sans-serif;fill:#202124}
      .title{font-size:28px;font-weight:700}
      .label{font-size:18px;font-weight:700}
      .body{font-size:15px}
      .small{font-size:13px;fill:#3c4043}
      .mono{font-family:Menlo,Consolas,monospace;font-size:13px}
    </style>
  </defs>

  <text x="58" y="56" class="title">SONIC / GR00T-WBC: Universal-token Whole-body Control</text>
  <text x="58" y="84" class="small">Source-grounded reconstruction from SONIC paper, GR00T-WBC repository, and training guide.</text>

  <rect x="60" y="134" width="250" height="104" rx="8" class="blue"/>
  <text x="88" y="168" class="label">G1 robot motion</text>
  <text x="88" y="199" class="body">joint trajectories</text>
  <text x="88" y="221" class="mono">29DoF Unitree G1</text>

  <rect x="60" y="270" width="250" height="104" rx="8" class="blue"/>
  <text x="88" y="304" class="label">VR teleoperation</text>
  <text x="88" y="335" class="body">head + two wrists</text>
  <text x="88" y="357" class="mono">3-point targets</text>

  <rect x="60" y="406" width="250" height="104" rx="8" class="blue"/>
  <text x="88" y="440" class="label">SMPL human motion</text>
  <text x="88" y="471" class="body">body joint positions</text>
  <text x="88" y="493" class="body">video / text / music sources</text>

  <rect x="60" y="542" width="250" height="104" rx="8" class="blue"/>
  <text x="88" y="576" class="label">Optional skeletons</text>
  <text x="88" y="607" class="body">SOMA / BVH positions</text>
  <text x="88" y="629" class="small">enabled in extended config</text>

  <rect x="390" y="160" width="230" height="456" rx="8" class="gray"/>
  <text x="427" y="198" class="label">Modality encoders</text>
  <text x="427" y="235" class="body">one encoder per motion format</text>
  <text x="427" y="270" class="body">project into common latent</text>
  <text x="427" y="305" class="body">normalize temporal structure</text>
  <text x="427" y="340" class="body">preserve control-relevant pose</text>
  <text x="427" y="385" class="mono">sonic_release:</text>
  <text x="427" y="409" class="mono">G1 + teleop + SMPL</text>
  <text x="427" y="445" class="mono">sonic_bones_seed:</text>
  <text x="427" y="469" class="mono">+ SOMA encoder</text>

  <rect x="704" y="160" width="260" height="178" rx="8" class="yellow"/>
  <text x="735" y="197" class="label">FSQ quantization</text>
  <text x="735" y="231" class="body">finite scalar quantization</text>
  <text x="735" y="258" class="body">regularizes latent tokens</text>
  <text x="735" y="285" class="body">aligns heterogeneous inputs</text>
  <text x="735" y="312" class="small">shared token vocabulary</text>

  <rect x="704" y="424" width="260" height="178" rx="8" class="green"/>
  <text x="735" y="461" class="label">Universal token space</text>
  <text x="735" y="495" class="body">format-invariant motion code</text>
  <text x="735" y="522" class="body">supports multi-source training</text>
  <text x="735" y="549" class="body">single controller interface</text>

  <rect x="1044" y="270" width="250" height="160" rx="8" class="green"/>
  <text x="1074" y="306" class="label">Shared decoder</text>
  <text x="1074" y="340" class="body">token -> G1 action</text>
  <text x="1074" y="367" class="body">whole-body tracking policy</text>
  <text x="1074" y="394" class="body">low-level joint control</text>

  <rect x="1044" y="514" width="250" height="104" rx="8" class="box"/>
  <text x="1074" y="548" class="label">Kinematic planner</text>
  <text x="1074" y="579" class="body">0.8s-2.4s future segments</text>
  <text x="1074" y="601" class="mono">&lt;5ms laptop, ~12ms Orin</text>

  <path d="M 310 186 L 390 244" class="line"/>
  <path d="M 310 322 L 390 342" class="line"/>
  <path d="M 310 458 L 390 442" class="line"/>
  <path d="M 310 594 L 390 540" class="line"/>
  <path d="M 620 334 C 654 300 670 264 704 249" class="line"/>
  <path d="M 834 338 L 834 424" class="line"/>
  <path d="M 964 513 C 1010 492 1024 430 1044 383" class="line"/>
  <path d="M 1169 514 L 1169 430" class="dash"/>

  <text x="58" y="742" class="small">Figure. SONIC reduces heterogeneous motion sources to a universal token interface, so one decoder/policy can track robot, VR, SMPL and skeleton commands.</text>
</svg>
